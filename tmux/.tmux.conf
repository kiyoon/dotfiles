# Dracula treats every temporary key table as a prefix. Keep its yellow prefix
# cue for Ctrl+a, but not while the window-drag table is active.
set-option -g status-left '#[bg=#bd93f9,fg=#282a36]#{?#{&&:#{client_prefix},#{!=:#{client_key_table},window-drag}},#[bg=#f1fa8c],} 🐰  #[fg=#bd93f9,bg=#44475a]#{?#{&&:#{client_prefix},#{!=:#{client_key_table},window-drag}},#[fg=#f1fa8c],}'

# Preserve the theme's window formats, then add stable per-window mouse ranges
# and a reserved one-cell drop marker. Replacing the normal separator with the
# reserved cell prevents the status line from shifting when a preview appears.
set-option -gF @window_drag_window_format '#{window-status-format}'
set-option -gF @window_drag_window_current_format '#{window-status-current-format}'
set-option -g @window_drag_preview_active '#{&&:#{==:#{client_key_table},window-drag},#{&&:#{==:#{@window_drag_ready},#{@window_drag_generation}},#{&&:#{!=:#{@window_drag_source},#{@window_drag_target}},#{==:#{window_id},#{@window_drag_target}}}}}'
set-option -g @window_drag_preview_before '#{&&:#{E:@window_drag_preview_active},#{e|<:#{@window_drag_target_index},#{@window_drag_source_index}}}'
set-option -g @window_drag_preview_after '#{&&:#{E:@window_drag_preview_active},#{e|>:#{@window_drag_target_index},#{@window_drag_source_index}}}'
set-option -g @window_drag_marker '#[fg=#ff79c6,bg=#44475a]'
set-window-option -g window-status-separator ''
set-window-option -g window-status-format '#[range=user|#{window_id}]#{?#{E:@window_drag_preview_before},#{E:@window_drag_marker},}#{T:@window_drag_window_format}#{?#{E:@window_drag_preview_before},,#{?#{E:@window_drag_preview_after},#{E:@window_drag_marker}, }}#[norange]'
set-window-option -g window-status-current-format '#[range=user|#{window_id}]#{?#{E:@window_drag_preview_before},#{E:@window_drag_marker},}#{T:@window_drag_window_current_format}#{?#{E:@window_drag_preview_before},,#{?#{E:@window_drag_preview_after},#{E:@window_drag_marker}, }}#[norange]'
