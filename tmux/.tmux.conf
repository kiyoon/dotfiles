bind -n 'C-F3' if-shell "$is_vim" 'send-keys C-F3' 'resize-pane -L 4'
bind -n 'C-F2' if-shell "$is_vim" 'send-keys C-F2' 'resize-pane -L 4'
bind -n 'C-F6' if-shell "$is_vim" 'send-keys C-F6' 'resize-pane -R 4'
