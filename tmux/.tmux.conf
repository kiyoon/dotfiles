bind -n 'S-F3' if-shell "$is_vim" 'send-keys S-F3' 'resize-pane -U 2'
bind -n 'S-F2' if-shell "$is_vim" 'send-keys S-F2' 'resize-pane -U 2'
bind -n 'S-F6' if-shell "$is_vim" 'send-keys S-F6' 'resize-pane -D 2'


