# Setting the prefix from `C-b` to `C-a`.
# By remapping the `CapsLock` key to `Ctrl`,
# you can make triggering commands more comfortable!
set -g prefix C-a

# Free the original `Ctrl-b` prefix keybinding.
unbind C-b

# Ensure that we can send `Ctrl-a` to other apps.
bind C-a send-prefix

# split panes using \ and -
bind \\ split-window -h
bind - split-window -v
# split panes at current directory (| and _)
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."

# Moving between panes.
# Use tmux.nvim plugin if possible. (Ctrl+ h,j,k,l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Enable mouse mode (tmux 2.1 and above)
set -g mouse on
# Mouse wheel (Linux only)
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M
bind -n C-WheelUpPane select-pane -t= \; copy-mode -e \; send-keys -M
bind -T copy-mode-vi    C-WheelUpPane   send-keys -X halfpage-up
bind -T copy-mode-vi    C-WheelDownPane send-keys -X halfpage-down

# don't rename windows automatically
#set-option -g allow-rename off

# forward inner program's OSC title (#T = pane_title) to the outer terminal
set -g set-titles on
set -g set-titles-string "#T"

# passthrough OSC52 clipboard copy
set -g allow-passthrough on
set -g set-clipboard on
set -as terminal-features ",*:hyperlinks"

# OSC 133 navigate per prompt
# needs tmux 3.4
# needs to print the osc 133 sequence before each prompt
# in bash, use PROMPT_COMMAND
# in zsh, use precmd()
# in this dotfiles, we have `wezterm.zsh` to set this up following
# https://wezterm.org/shell-integration.html
bind-key -T copy-mode-vi [ send-keys -X previous-prompt
bind-key -T copy-mode-vi ] send-keys -X next-prompt
# Jump between prompts with Ctrl+Alt+Up/Down from normal mode too.
bind -n C-M-k if-shell -F '#{pane_in_mode}' 'send-keys -X previous-prompt' 'copy-mode; send-keys -X previous-prompt'
bind -n C-M-j if-shell -F '#{pane_in_mode}' 'send-keys -X next-prompt'     'copy-mode; send-keys -X next-prompt'

# v3.6
# set-option -g pane-scrollbars modal
set-option -g pane-scrollbars on
set -g pane-scrollbars-style "fg=#392a48,width=1,pad=0"
# bump if you use SIXEL, kitty graphics, etc.
set -s input-buffer-size 128000000

# Pass C-1, C-2, C-3, C-4 to the terminal. Make sure the terminal supports it.
# set -s extended-keys on
# set -as terminal-features 'xterm*:extkeys'

# Pane resizing.
# bind -r H resize-pane -L 5
# bind -r J resize-pane -D 5
# bind -r K resize-pane -U 5
# bind -r L resize-pane -R 5

# Move current pane to next/prev window
# Get the next window id by calling the script
bind -r N run-shell "tmux join-pane -h -t $(~/.config/dotfiles/tmux/scripts/get_next_window_uid.sh)"
bind -r P run-shell "tmux join-pane -h -t $(~/.config/dotfiles/tmux/scripts/get_prev_window_uid.sh)"
bind b run-shell "tmux break-pane"

# reorder windows.
# C-S-Left/Right are reserved for WezTerm tab moving; use M-F2/F3/F5/F6 below instead.
# bind-key -n C-S-Left swap-window -d -t -1
# bind-key -n C-S-Right swap-window -d -t +1
bind -r H swap-window -d -t -1
bind -r L swap-window -d -t +1

# 256 colour
# set -g default-terminal "tmux-256color"
# set -ag terminal-overrides ",xterm-256color:RGB"

# This works with wezterm.
set -g default-terminal "${TERM}"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

# Home End key doesn't work?
bind-key -n Home send Escape "OH"
bind-key -n End send Escape "OF"
# set-window-option -g xterm-keys on

# Vimlike copy mode.
# WARN: tmux-yank plugin may override this.

bind-key Escape copy-mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
# unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe "xclip -selection c"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "xclip -in -selection clipboard"

## Hold and drag a window title to reorder windows
# Each press gets a generation number. Only that generation becomes draggable
# after 0.5 seconds, so the status redraw caused by a normal click cannot turn
# a tiny pointer movement into an accidental reorder.
set-option -goq @window_drag_generation 0

unbind-key -T root MouseDown1Status
unbind-key -T prefix MouseDown1Status
unbind-key -T root MouseDragEnd1Status
bind-key -T root MouseDown1Status {
  set-option -F @window_drag_generation '#{e|+:#{@window_drag_generation},1}'
  set-option -qu @window_drag_ready
  set-option -qu @window_drag_target
  set-option -qu @window_drag_target_index
  set-option -qu @window_drag_source_index
  set-option -F @window_drag_source '#{?#{==:#{mouse_status_range},window},#{window_id},#{mouse_status_range}}'
  set-option -F @window_drag_source_index '#{W:#{?#{==:#{window_id},#{@window_drag_source}},#{window_index},}}'
  run-shell -bC -d 0.5 'set-option -t "#{session_id}" @window_drag_ready "#{@window_drag_generation}" ; refresh-client -S -t "#{client_name}"'
  run-shell -C 'switch-client -t "#{session_id}:#{@window_drag_source}"'
  switch-client -T window-drag
}
bind-key -T prefix MouseDown1Status {
  set-option -F @window_drag_generation '#{e|+:#{@window_drag_generation},1}'
  set-option -qu @window_drag_ready
  set-option -qu @window_drag_target
  set-option -qu @window_drag_target_index
  set-option -qu @window_drag_source_index
  set-option -F @window_drag_source '#{?#{==:#{mouse_status_range},window},#{window_id},#{mouse_status_range}}'
  set-option -F @window_drag_source_index '#{W:#{?#{==:#{window_id},#{@window_drag_source}},#{window_index},}}'
  run-shell -bC -d 0.5 'set-option -t "#{session_id}" @window_drag_ready "#{@window_drag_generation}" ; refresh-client -S -t "#{client_name}"'
  run-shell -C 'switch-client -t "#{session_id}:#{@window_drag_source}"'
  switch-client -T window-drag
}

# The window formats below expose the hovered window ID through
# mouse_status_range. Preview only after this press has passed the hold delay.
bind-key -T window-drag MouseDrag1Status {
  if-shell -F '#{m/r:^@[0-9]+$,#{mouse_status_range}}' {
    set-option -F @window_drag_target '#{mouse_status_range}'
    set-option -F @window_drag_target_index '#{W:#{?#{==:#{window_id},#{@window_drag_target}},#{window_index},}}'
  } {
    set-option -qu @window_drag_target
    set-option -qu @window_drag_target_index
  }
  switch-client -T window-drag
}

# Swallow motion outside the window list while a title drag is active. The
# catch-all binding below cancels on release (or any unrelated key).
bind-key -T window-drag MouseDrag1Pane { set-option -qu @window_drag_target; set-option -qu @window_drag_target_index; switch-client -T window-drag; }
bind-key -T window-drag MouseDrag1Border { set-option -qu @window_drag_target; set-option -qu @window_drag_target_index; switch-client -T window-drag; }
bind-key -T window-drag MouseDrag1StatusDefault { set-option -qu @window_drag_target; set-option -qu @window_drag_target_index; switch-client -T window-drag; }
bind-key -T window-drag MouseDrag1StatusLeft { set-option -qu @window_drag_target; set-option -qu @window_drag_target_index; switch-client -T window-drag; }
bind-key -T window-drag MouseDrag1StatusRight { set-option -qu @window_drag_target; set-option -qu @window_drag_target_index; switch-client -T window-drag; }
bind-key -T window-drag MouseDrag1ScrollbarSlider { set-option -qu @window_drag_target; set-option -qu @window_drag_target_index; switch-client -T window-drag; }
bind-key -T window-drag MouseDrag1ScrollbarUp { set-option -qu @window_drag_target; set-option -qu @window_drag_target_index; switch-client -T window-drag; }
bind-key -T window-drag MouseDrag1ScrollbarDown { set-option -qu @window_drag_target; set-option -qu @window_drag_target_index; switch-client -T window-drag; }

# tmux draws clipped-window < and > markers as StatusDefault, not as windows.
# Their columns sit immediately after status-left and before status-right.
bind-key -T root MouseDown1StatusDefault if-shell -F '#{==:#{mouse_x},#{w:#{T;=/#{status-left-length}:status-left}}}' 'previous-window' 'if-shell -F "#{==:#{mouse_x},#{e|-:#{client_width},#{e|+:#{w:#{T;=/#{status-right-length}:status-right}},1}}}" "next-window" "run-shell -b :"'
bind-key -T prefix MouseDown1StatusDefault if-shell -F '#{==:#{mouse_x},#{w:#{T;=/#{status-left-length}:status-left}}}' 'previous-window' 'if-shell -F "#{==:#{mouse_x},#{e|-:#{client_width},#{e|+:#{w:#{T;=/#{status-right-length}:status-right}},1}}}" "next-window" "run-shell -b :"'
bind-key -T window-drag MouseDragEnd1Status {
  if-shell -F '#{&&:#{==:#{@window_drag_ready},#{@window_drag_generation}},#{&&:#{m/r:^@[0-9]+$,#{@window_drag_source}},#{&&:#{m/r:^@[0-9]+$,#{@window_drag_target}},#{&&:#{m/r:^[0-9]+$,#{@window_drag_source_index}},#{&&:#{m/r:^[0-9]+$,#{@window_drag_target_index}},#{!=:#{@window_drag_source},#{@window_drag_target}}}}}}}' {
    run-shell -C 'move-window #{?#{e|<:#{@window_drag_target_index},#{@window_drag_source_index}},-b,-a} -s "#{session_id}:#{@window_drag_source}" -t "#{session_id}:#{@window_drag_target}" ; move-window -r -t "#{session_id}:"'
  }
  set-option -F @window_drag_generation '#{e|+:#{@window_drag_generation},1}'
  set-option -qu @window_drag_ready
  set-option -qu @window_drag_target
  set-option -qu @window_drag_target_index
  set-option -qu @window_drag_source
  set-option -qu @window_drag_source_index
  switch-client -T root
}

# Releasing anywhere except a window title cancels and clears the preview.
bind-key -T window-drag MouseDragEnd1StatusDefault {
  set-option -F @window_drag_generation '#{e|+:#{@window_drag_generation},1}'
  set-option -qu @window_drag_ready
  set-option -qu @window_drag_target
  set-option -qu @window_drag_target_index
  set-option -qu @window_drag_source
  set-option -qu @window_drag_source_index
  switch-client -T root
}

bind-key -T window-drag Any {
  set-option -F @window_drag_generation '#{e|+:#{@window_drag_generation},1}'
  set-option -qu @window_drag_ready
  set-option -qu @window_drag_target
  set-option -qu @window_drag_target_index
  set-option -qu @window_drag_source
  set-option -qu @window_drag_source_index
  switch-client -T root
}

## Click rabbit on the bottom left to toggle prefix mode
# Use MouseUp to enter prefix mode; MouseDown would be consumed by the paired release.
# Prefix-mode clicks go through a temporary table so the release toggles prefix off.
bind-key -T root MouseDown1StatusLeft run-shell -b ':'
bind-key -T root MouseUp1StatusLeft switch-client -T prefix
bind-key -T prefix MouseDown1StatusLeft switch-client -T rabbit-prefix-toggle-off
bind-key -T rabbit-prefix-toggle-off MouseUp1StatusLeft switch-client -T root

